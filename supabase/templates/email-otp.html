<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Echo Speak sign-in code</title>
  </head>
  <body style="margin: 0; padding: 24px; background: #f7f7f7; color: #222222; font-family: Georgia, 'Times New Roman', serif;">
    <div style="max-width: 480px; margin: 0 auto; background: #ffffff; border: 1px solid #d4d4d4; padding: 24px;">
      <p style="margin: 0 0 8px; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase;">Echo Speak</p>
      <h1 style="margin: 0 0 16px; font-size: 22px; font-weight: 400;">Your sign-in code</h1>
      <p style="margin: 0 0 20px; font-size: 15px; line-height: 1.5;">
        Enter this code on the Settings page to sign in as
        <strong>{{ .Email }}</strong>.
      </p>
      <p
        style="margin: 0 0 20px; font-size: 32px; letter-spacing: 0.35em; font-weight: 400; text-align: center;"
      >
        {{ .Token }}
      </p>
      <div
        style="margin: 0 0 20px; padding: 12px 14px; border: 2px solid #222222; background: #fff8e8; font-size: 14px; line-height: 1.5;"
      >
        <strong>Important:</strong> this code
        <strong> expires in 5 minutes</strong>
        and
        <strong> works only once</strong>.
        Do not share it with anyone.
      </div>
      <p style="margin: 0; font-size: 12px; line-height: 1.5; color: #666666;">
        If you did not request this code, you can ignore this email.
      </p>
    </div>
  </body>
</html>
